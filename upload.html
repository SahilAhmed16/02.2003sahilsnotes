<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotesHub — Upload Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#020817;
    --bg-2:#04122b;
    --blue:#2f8bff;
    --blue-bright:#5ec8ff;
    --blue-dim:#0d3a70;
    --text:#eaf3ff;
    --text-dim:#8fb0d9;
    --card:rgba(10,26,53,0.55);
    --border:rgba(94,200,255,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:radial-gradient(ellipse at 50% -10%, #0a2a55 0%, var(--bg-1) 55%, #010509 100%);
    overflow:hidden;
    position:relative;
  }

  /* animated network canvas — full background */
  #netCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
  }

  /* drifting glow orbs */
  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    opacity:.35;
    z-index:0;
    pointer-events:none;
  }
  .orb.o1{width:420px;height:420px;background:var(--blue);top:-120px;left:-100px;animation:drift1 22s ease-in-out infinite;}
  .orb.o2{width:360px;height:360px;background:var(--blue-bright);bottom:-140px;right:-80px;animation:drift2 26s ease-in-out infinite;}
  .orb.o3{width:280px;height:280px;background:#1e4fbf;top:40%;left:60%;animation:drift3 18s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0);}50%{transform:translate(80px,60px);}}
  @keyframes drift2{0%,100%{transform:translate(0,0);}50%{transform:translate(-70px,-50px);}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,50px) scale(1.15);}}

  /* scanning grid sweep */
  .grid-overlay{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(94,200,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,200,255,0.06) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse 75% 65% at 50% 45%, black 30%, transparent 100%);
  }
  .scan-line{
    position:fixed;left:0;right:0;height:2px;z-index:0;pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--blue-bright), transparent);
    box-shadow:0 0 14px 2px var(--blue-bright);
    opacity:.55;
    animation:scan 7s linear infinite;
  }
  @keyframes scan{0%{top:-2%;}100%{top:102%;}}

  /* top nav */
  .topbar{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 6vw;
  }
  .logo{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;
    letter-spacing:.02em;display:flex;align-items:center;gap:10px;color:#fff;
  }
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--blue-bright);box-shadow:0 0 10px var(--blue-bright);}
  .tag{
    font-size:12px;font-family:monospace;color:var(--text-dim);
    border:1px solid var(--border);padding:5px 12px;border-radius:20px;letter-spacing:.05em;
  }

  /* main center content */
  main{
    position:relative;z-index:2;
    height:calc(100vh - 84px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 6vw;
  }
  .eyebrow{
    font-family:monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--blue-bright);margin-bottom:18px;opacity:0;
    animation:fadeUp .8s ease forwards .1s;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(40px,7vw,88px);
    letter-spacing:-.01em;
    line-height:1;
    background:linear-gradient(180deg,#ffffff 20%, var(--blue-bright) 140%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;
    animation:fadeUp .8s ease forwards .25s;
  }
  .subtext{
    margin-top:20px;
    color:var(--text-dim);
    font-size:16px;
    max-width:520px;
    opacity:0;
    animation:fadeUp .8s ease forwards .4s;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
  }

  .card{
    margin-top:52px;
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:34px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    box-shadow:0 20px 60px rgba(0,20,60,0.45);
    opacity:0;
    animation:fadeUp .8s ease forwards .55s;
  }
  .card .label{
    font-family:monospace;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--text-dim);
  }

  .upload-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:12px;
    padding:16px 30px;
    border-radius:12px;
    background:linear-gradient(135deg, var(--blue) 0%, #1657c9 100%);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:16px;
    text-decoration:none;
    letter-spacing:.01em;
    border:1px solid rgba(255,255,255,0.15);
    overflow:hidden;
    isolation:isolate;
    transition:transform .25s ease, box-shadow .25s ease;
    box-shadow:0 10px 30px rgba(47,139,255,0.35);
  }
  .upload-btn::before{
    content:'';
    position:absolute;inset:0;z-index:-1;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
    transform:translateX(-120%);
    transition:transform .6s ease;
  }
  .upload-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 40px rgba(47,139,255,0.55);
  }
  .upload-btn:hover::before{transform:translateX(120%);}
  .upload-btn svg{width:18px;height:18px;flex-shrink:0;}

  footer{
    position:relative;z-index:2;
    text-align:center;
    padding:16px;
    font-family:monospace;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.05em;
  }

  @media (max-width:640px){
    .card{padding:26px 22px;}
    .upload-btn{font-size:14px;padding:14px 22px;}
  }
</style>
</head>
<body>

<canvas id="netCanvas"></canvas>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
<div class="grid-overlay"></div>
<div class="scan-line"></div>

<div class="topbar">
  <div class="logo"><span class="dot"></span>NotesHub</div>
  <div class="tag">SECURE UPLOAD PORTAL</div>
</div>

<main>
  <div class="eyebrow">NotesHub / Repository</div>
  <h1>UPLOAD PAGE</h1>
  <p class="subtext">Access notes and study material uploaded to NotesHub. Select a subject below to open its content.</p>

  <div class="card">
    <div class="label">Available Upload</div>
    <a class="upload-btn" href="uploads/upload_Normalization.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/>
        <path d="M7 8l5-5 5 5"/>
        <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
      </svg>
      Normalization Theory (DBMS)
    </a>
  </div>
</main>

<footer>© NotesHub — Study Material Repository</footer>

<script>
  // animated particle network background
  const canvas = document.getElementById('netCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COUNT = Math.min(90, Math.floor((window.innerWidth * window.innerHeight) / 14000));

  function makeParticles(){
    particles = Array.from({length: COUNT}, () => ({
      x: Math.random()*w,
      y: Math.random()*h,
      vx: (Math.random()-0.5)*0.4,
      vy: (Math.random()-0.5)*0.4,
      r: Math.random()*1.6 + 0.6
    }));
  }
  makeParticles();

  const LINK_DIST = 140;

  function step(){
    ctx.clearRect(0,0,w,h);

    for(const p of particles){
      p.x += p.vx;
      p.y += p.vy;
      if(p.x < 0 || p.x > w) p.vx *= -1;
      if(p.y < 0 || p.y > h) p.vy *= -1;
    }

    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const a = particles[i], b = particles[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < LINK_DIST){
          ctx.strokeStyle = `rgba(94,200,255,${(1 - dist/LINK_DIST)*0.35})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }

    for(const p of particles){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = 'rgba(150,215,255,0.9)';
      ctx.shadowColor = 'rgba(94,200,255,0.8)';
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    requestAnimationFrame(step);
  }
  step();
</script>
</body>
</html>
