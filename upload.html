<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Portal Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #001f3f, #003b73, #0059b3, #007fff);
      background-size: 400% 400%;
      animation: gradientFlow 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: white;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Floating circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: float 10s infinite ease-in-out;
      backdrop-filter: blur(10px);
    }

    .circle:nth-child(1) {
      width: 250px;
      height: 250px;
      top: -80px;
      left: -50px;
      animation-duration: 12s;
    }

    .circle:nth-child(2) {
      width: 180px;
      height: 180px;
      bottom: -50px;
      right: 40px;
      animation-duration: 9s;
    }

    .circle:nth-child(3) {
      width: 120px;
      height: 120px;
      top: 20%;
      right: 10%;
      animation-duration: 8s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-30px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 45px;
      border-radius: 30px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 0 50px rgba(0, 183, 255, 0.3);
      position: relative;
      overflow: hidden;
      animation: fadeIn 1.5s ease;
    }

    .container::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(255,255,255,0.1),
        transparent
      );
      top: -50%;
      left: -50%;
      transform: rotate(25deg);
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%) rotate(25deg);
      }
      100% {
        transform: translateX(100%) rotate(25deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    h1 {
      font-size: 3rem;
      color: #dff6ff;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .typing {
      font-size: 1.2rem;
      line-height: 1.8;
      color: #eaf7ff;
      margin-top: 15px;
      min-height: 90px;
      font-weight: 300;
    }

    .loader {
      width: 80%;
      height: 12px;
      background: rgba(255,255,255,0.15);
      margin: 35px auto 15px;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 40%;
      border-radius: 50px;
      background: linear-gradient(to right, #00bfff, #7fe7ff);
      animation: loading 2s infinite ease-in-out;
      box-shadow: 0 0 15px #00d0ff;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(250%);
      }
    }

    .status {
      margin-top: 10px;
      color: #d8f4ff;
      letter-spacing: 1px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.4;
      }
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(0, 183, 255, 0.15);
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      animation: pulse 6s infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.2);
      }
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }

      .typing {
        font-size: 1rem;
      }

      .container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="glow"></div>

  <div class="container">
    <div class="icon">📘</div>

    <h1>Upload Portal</h1>

    <div class="typing" id="typingText"></div>

    <div class="loader">
      <span></span>
    </div>

    <p class="status">Initializing Upload System...</p>
  </div>

  <script>
    const text = "Sahil is currently busy. The upload section will start running soon! Please stay tuned for upcoming study materials and updates.";

    let index = 0;
    const speed = 40;

    function typeWriter() {
      if (index < text.length) {
        document.getElementById('typingText').innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
      }
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
