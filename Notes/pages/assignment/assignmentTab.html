<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semester One</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020818;
      --blue1: #0a84ff;
      --blue2: #00cfff;
      --blue3: #0040ff;
      --purple: #7b2ff7;
      --glow: rgba(10,132,255,0.5);
      --text: #c8deff;
      --muted: #3a5a8a;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ═══════════════════════════════════════
       CANVAS BACKGROUND
    ═══════════════════════════════════════ */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════ */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* ── Title ── */
    .title-block {
      margin-bottom: 64px;
      animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--blue2);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.85;
    }
    .main-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 10%, var(--blue1) 55%, var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .sub {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════
       OPTION TABS
    ═══════════════════════════════════════ */
    .tabs {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab {
      position: relative;
      width: 260px;
      height: 260px;
      cursor: pointer;
      animation: riseIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      text-decoration: none;
    }
    .tab:nth-child(1) { animation-delay: 0.10s; }
    .tab:nth-child(2) { animation-delay: 0.25s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(32px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* card face */
    .tab-inner {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      border: 1px solid rgba(10,132,255,0.25);
      background: linear-gradient(160deg, rgba(10,20,60,0.9) 0%, rgba(4,10,30,0.95) 100%);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s,
                  box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    /* shimmer sweep */
    .tab-inner::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -60%;
      width: 50%;
      height: 220%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.07), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }
    .tab:hover .tab-inner::before { left: 160%; }

    /* corner accents */
    .tab-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(10,132,255,0.15) 0%, transparent 40%),
        linear-gradient(315deg, rgba(0,207,255,0.10) 0%, transparent 40%);
      pointer-events: none;
    }

    .tab:hover .tab-inner {
      transform: translateY(-10px) scale(1.04);
      border-color: var(--blue1);
      box-shadow:
        0 0 40px rgba(10,132,255,0.5),
        0 0 80px rgba(10,132,255,0.18),
        inset 0 0 30px rgba(10,132,255,0.08);
    }

    /* icon chip */
    .tab-icon {
      width: 62px; height: 62px;
      border-radius: 16px;
      background: rgba(10,132,255,0.12);
      border: 1px solid rgba(10,132,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      position: relative; z-index: 1;
      transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
    }
    .tab:hover .tab-icon {
      background: rgba(10,132,255,0.25);
      box-shadow: 0 0 18px rgba(10,132,255,0.5);
      transform: scale(1.08);
    }

    .tab-label {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--blue2);
      position: relative; z-index: 1;
    }

    .tab-name {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, var(--blue1), var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      padding: 0 14px;
      line-height: 1.4;
      position: relative; z-index: 1;
    }

    .tab-sub {
      font-size: 11px;
      color: var(--text);
      opacity: 0.55;
      letter-spacing: 0.05em;
      position: relative; z-index: 1;
    }

    /* bottom bar indicator */
    .tab-bar {
      position: absolute;
      bottom: 0; left: 20px; right: 20px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--blue3), var(--blue1), var(--blue2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 0 10px var(--blue1);
    }
    .tab:hover .tab-bar { transform: scaleX(1); }

    /* pulse ring on hover */
    .tab-ring {
      position: absolute;
      inset: -1px;
      border-radius: 23px;
      border: 1px solid transparent;
      pointer-events: none;
    }
    .tab:hover .tab-ring {
      animation: ringPulse 1.2s ease-out infinite;
    }
    @keyframes ringPulse {
      0%   { box-shadow: 0 0 0 0 rgba(10,132,255,0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(10,132,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(10,132,255,0); }
    }

    /* ── hint text ── */
    .hint {
      margin-top: 52px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: fadeDown 1s 0.6s both;
      font-family: 'Orbitron', monospace;
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <div class="title-block">
    <div class="eyebrow">// Sahil Notes Hub</div>
    <div class="main-title">SEMESTER ONE</div>
    <div class="sub">Select an assignment type to continue</div>
  </div>

  <div class="tabs">
    <a class="tab" href="internal/internalTab.html">
      <div class="tab-inner">
        <div class="tab-icon">📝</div>
        <div class="tab-label">Internal</div>
        <div class="tab-name">Internal Assignment</div>
        <div class="tab-sub">Mid Semester</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>

    <a class="tab" href="external/externalTab.html">
      <div class="tab-inner">
        <div class="tab-icon">🎓</div>
        <div class="tab-label">External</div>
        <div class="tab-name">External Assignment</div>
        <div class="tab-sub">End Semester</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>

    <a class="tab" href="coveringPage.html">
      <div class="tab-inner">
        <div class="tab-icon">📝</div>
        <div class="tab-label">Make Your front Page</div>
        <div class="tab-name">Front Page Maker</div>
        <div class="tab-sub">Put your details.</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>
  </div>

  <div class="hint">▸ CLICK TO OPEN</div>
</div>

<script>
/* ═══════════════════════════════════════════
   ANIMATED CANVAS BACKGROUND — ENHANCED
   - Drifting circuit grid with wave distortion
   - Floating particles / data nodes with trails
   - Multiple scanline sweeps
   - Pulsing connection lines
   - Orbiting energy rings
   - Binary rain
   - Shooting comet streaks
═══════════════════════════════════════════ */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

let W, H;
const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
resize();
window.addEventListener('resize', resize);

// --- Grid ---
const CELL = 52;

// --- Particles ---
const PARTICLE_COUNT = 85;
const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
  x: Math.random() * 2000,
  y: Math.random() * 1200,
  vx: (Math.random() - 0.5) * 0.4,
  vy: (Math.random() - 0.5) * 0.4,
  r: Math.random() * 2 + 1,
  alpha: Math.random() * 0.6 + 0.25,
  pulse: Math.random() * Math.PI * 2,
  hue: Math.random() < 0.5 ? 'blue' : 'purple',
}));

// --- Data nodes ---
const nodes = [];
const makeNodes = () => {
  nodes.length = 0;
  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      if (Math.random() < 0.07) {
        nodes.push({ x: c * CELL, y: r * CELL, phase: Math.random() * Math.PI * 2, size: Math.random() * 3 + 2, speed: Math.random() * 1 + 0.8 });
      }
    }
  }
};
makeNodes();
window.addEventListener('resize', makeNodes);

// --- Scanlines (two, offset) ---
let scanY1 = 0;
let scanY2 = 0;

// --- Binary rain ---
const BINARY = '01';
const drops = Array.from({ length: Math.ceil(2400 / 26) }, () => ({
  x: 0, y: Math.random() * -1200, speed: Math.random() * 0.7 + 0.25, alpha: Math.random() * 0.09 + 0.02,
}));

// --- Comet streaks ---
const comets = Array.from({ length: 4 }, () => spawnComet());
function spawnComet() {
  const fromLeft = Math.random() < 0.5;
  return {
    x: fromLeft ? -100 : W + 100,
    y: Math.random() * H * 0.7,
    vx: (fromLeft ? 1 : -1) * (Math.random() * 3 + 3),
    vy: Math.random() * 1.2 - 0.4,
    len: Math.random() * 90 + 60,
    alpha: 0,
    life: 0,
    delay: Math.random() * 400,
  };
}

// --- Orbiting energy rings (behind cards) ---
let ringAngle = 0;

let t = 0;
function draw() {
  t += 0.012;
  ctx.clearRect(0, 0, W, H);

  // Deep space gradient
  const bg = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, Math.max(W, H) * 0.75);
  bg.addColorStop(0, '#040d2a');
  bg.addColorStop(1, '#020818');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Wavy grid ──
  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;
  ctx.strokeStyle = 'rgba(10,132,255,0.07)';
  ctx.lineWidth = 0.7;
  for (let c = 0; c < cols; c++) {
    ctx.beginPath();
    for (let r = 0; r <= rows; r++) {
      const wobble = Math.sin(t * 1.2 + r * 0.3 + c * 0.15) * 3;
      const x = c * CELL + wobble;
      const y = r * CELL;
      if (r === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  for (let r = 0; r < rows; r++) {
    ctx.beginPath();
    for (let c = 0; c <= cols; c++) {
      const wobble = Math.cos(t * 1.2 + c * 0.3 + r * 0.15) * 3;
      const x = c * CELL;
      const y = r * CELL + wobble;
      if (c === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // ── Glowing grid nodes ──
  nodes.forEach(n => {
    const pulse = (Math.sin(t * n.speed + n.phase) + 1) / 2;
    const a = 0.15 + pulse * 0.55;
    const s = n.size + pulse * 2.4;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, s * 3);
    g.addColorStop(0, `rgba(10,200,255,${a})`);
    g.addColorStop(1, 'rgba(10,132,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(n.x, n.y, s * 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = `rgba(200,240,255,${a * 0.9})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2); ctx.fill();
  });

  // ── Binary rain ──
  ctx.font = '11px monospace';
  drops.forEach((d, i) => {
    d.x = (i * 26) % W;
    d.y += d.speed;
    if (d.y > H + 20) d.y = Math.random() * -200;
    const char = BINARY[Math.floor(Math.random() * BINARY.length)];
    ctx.fillStyle = `rgba(0,180,255,${d.alpha})`;
    ctx.fillText(char, d.x, d.y);
  });

  // ── Floating particles + trails ──
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.pulse += 0.03;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
    const color = p.hue === 'blue' ? '10,160,255' : '150,90,255';
    const gp = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    gp.addColorStop(0, `rgba(${color},${a})`);
    gp.addColorStop(1, `rgba(${color},0)`);
    ctx.fillStyle = gp;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(200,230,255,${a})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.8, 0, Math.PI * 2); ctx.fill();
  });

  // ── Connection lines between nearby particles ──
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 130) {
        const a = (1 - dist / 130) * 0.2;
        ctx.strokeStyle = `rgba(10,160,255,${a})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // ── Comet streaks ──
  comets.forEach(c => {
    if (c.delay > 0) { c.delay--; return; }
    c.life++;
    c.x += c.vx; c.y += c.vy;
    c.alpha = Math.min(1, c.life / 20) * (c.x > 0 && c.x < W ? 1 : 0.3);
    const tailX = c.x - c.vx * (c.len / Math.max(Math.abs(c.vx), 0.1));
    const tailY = c.y - c.vy * (c.len / Math.max(Math.abs(c.vx), 0.1));
    const grad = ctx.createLinearGradient(c.x, c.y, tailX, tailY);
    grad.addColorStop(0, `rgba(180,230,255,${0.5 * c.alpha})`);
    grad.addColorStop(1, 'rgba(10,132,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();
    if (c.x < -150 || c.x > W + 150) {
      Object.assign(c, spawnComet(), { delay: Math.random() * 600 + 200 });
    }
  });

  // ── Dual scanline sweep ──
  scanY1 = (scanY1 + 0.7) % (H + 200) - 100;
  scanY2 = (scanY2 + 0.5) % (H + 300) - 150;
  [ [scanY1, 0.045], [scanY2, 0.03] ].forEach(([y, strength]) => {
    const scan = ctx.createLinearGradient(0, y - 90, 0, y + 90);
    scan.addColorStop(0, 'rgba(10,132,255,0)');
    scan.addColorStop(0.5, `rgba(10,132,255,${strength})`);
    scan.addColorStop(1, 'rgba(10,132,255,0)');
    ctx.fillStyle = scan;
    ctx.fillRect(0, y - 90, W, 180);

    ctx.strokeStyle = 'rgba(0,200,255,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  // ── Orbiting energy rings behind center ──
  ringAngle += 0.004;
  const cx = W / 2, cy = H / 2;
  [1, -1].forEach((dir, idx) => {
    const radius = 260 + idx * 70;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ringAngle * dir * (idx + 1));
    ctx.strokeStyle = `rgba(10,${180 - idx * 40},255,0.06)`;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 14]);
    ctx.beginPath();
    ctx.ellipse(0, 0, radius, radius * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });

  // ── Center glow behind cards ──
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.45);
  cg.addColorStop(0, 'rgba(10,60,160,0.2)');
  cg.addColorStop(1, 'rgba(10,60,160,0)');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
