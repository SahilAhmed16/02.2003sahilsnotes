<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Computer Architecture Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020818;
      --blue1: #0a84ff;
      --blue2: #00cfff;
      --blue3: #0040ff;
      --glow: rgba(10,132,255,0.5);
      --text: #c8deff;
      --muted: #3a5a8a;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ═══════════════════════════════════════
       CANVAS BACKGROUND
    ═══════════════════════════════════════ */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ═══════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════ */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 24px;
      width: 100%;
      max-width: 860px;
    }

    /* ── Title ── */
    .title-block {
      margin-bottom: 56px;
      animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--blue2);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.85;
    }
    .main-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 4.5vw, 40px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 10%, var(--blue1) 55%, var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .sub {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════
       UNIT TABS
    ═══════════════════════════════════════ */
    .tabs {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab {
      position: relative;
      width: 170px;
      height: 190px;
      cursor: pointer;
      animation: riseIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      text-decoration: none;
    }
    .tab:nth-child(1) { animation-delay: 0.10s; }
    .tab:nth-child(2) { animation-delay: 0.20s; }
    .tab:nth-child(3) { animation-delay: 0.30s; }
    .tab:nth-child(4) { animation-delay: 0.40s; }
    .tab:nth-child(5) { animation-delay: 0.50s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(32px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* card face */
    .tab-inner {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      border: 1px solid rgba(10,132,255,0.25);
      background: linear-gradient(160deg, rgba(10,20,60,0.9) 0%, rgba(4,10,30,0.95) 100%);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s,
                  box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    /* shimmer sweep */
    .tab-inner::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -60%;
      width: 50%;
      height: 220%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.06), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }
    .tab:hover .tab-inner::before { left: 160%; }

    /* corner accents */
    .tab-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(10,132,255,0.15) 0%, transparent 40%),
        linear-gradient(315deg, rgba(0,207,255,0.10) 0%, transparent 40%);
      pointer-events: none;
    }

    .tab:hover .tab-inner {
      transform: translateY(-8px) scale(1.03);
      border-color: var(--blue1);
      box-shadow:
        0 0 30px rgba(10,132,255,0.45),
        0 0 60px rgba(10,132,255,0.15),
        inset 0 0 30px rgba(10,132,255,0.07);
    }

    /* unit number */
    .tab-num {
      font-family: 'Orbitron', monospace;
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff, var(--blue1), var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(10,132,255,0.6));
      position: relative; z-index: 1;
    }

    .tab-label {
      font-family: 'Orbitron', monospace;
      font-size: 9.5px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--blue2);
      position: relative; z-index: 1;
    }

    .tab-name {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text);
      opacity: 0.7;
      text-align: center;
      padding: 0 12px;
      line-height: 1.4;
      position: relative; z-index: 1;
    }

    /* bottom bar indicator */
    .tab-bar {
      position: absolute;
      bottom: 0; left: 16px; right: 16px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--blue3), var(--blue1), var(--blue2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 0 8px var(--blue1);
    }
    .tab:hover .tab-bar { transform: scaleX(1); }

    /* pulse ring on hover */
    .tab-ring {
      position: absolute;
      inset: -1px;
      border-radius: 19px;
      border: 1px solid transparent;
      pointer-events: none;
    }
    .tab:hover .tab-ring {
      animation: ringPulse 1.2s ease-out infinite;
    }
    @keyframes ringPulse {
      0%   { box-shadow: 0 0 0 0 rgba(10,132,255,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(10,132,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(10,132,255,0); }
    }

    /* icon chip */
    .tab-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: rgba(10,132,255,0.12);
      border: 1px solid rgba(10,132,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      position: relative; z-index: 1;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .tab:hover .tab-icon {
      background: rgba(10,132,255,0.25);
      box-shadow: 0 0 14px rgba(10,132,255,0.4);
    }

    /* ── hint text ── */
    .hint {
      margin-top: 44px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: fadeDown 1s 0.6s both;
      font-family: 'Orbitron', monospace;
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <div class="title-block">
    <div class="eyebrow">// Sahil Notes Hub</div>
    <div class="main-title">INTERNAL ASSIGNMENT</div>
    <div class="sub">Select a unit to open your notes</div>
  </div>

  <div class="tabs">
    <a class="tab" href="javaAssignment.html">
      <div class="tab-inner">
        <div class="tab-icon">☕</div>
        <div class="tab-num">01</div>
        <div class="tab-label">Java Assignment</div>
        <div class="tab-name">Paper- CCMCA102</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>

    <a class="tab" href="U2_computer_architecture.html">
      <div class="tab-inner">
        <div class="tab-icon">🧠</div>
        <div class="tab-num">02</div>
        <div class="tab-label">Management</div>
        <div class="tab-name">Paper- CCMCA103</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>

    <!-- <a class="tab" href="unit4.html">
      <div class="tab-inner">
        <div class="tab-icon">⚙️</div>
        <div class="tab-num">04</div>
        <div class="tab-label">Unit · IV</div>
        <div class="tab-name">Pipelining and Peripherals</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a>

    <a class="tab" href="unit5.html">
      <div class="tab-inner">
        <div class="tab-icon">🔌</div>
        <div class="tab-num">05</div>
        <div class="tab-label">Unit · V</div>
        <div class="tab-name">I/O Organisation</div>
        <div class="tab-bar"></div>
      </div>
      <div class="tab-ring"></div>
    </a> -->
  </div>

  <div class="hint">▸ CLICK ANY UNIT TO OPEN NOTES</div>
</div>

<script>
/* ═══════════════════════════════════════════
   ANIMATED CANVAS BACKGROUND
   - Drifting circuit grid
   - Floating particles / data nodes
   - Scanline sweep
   - Pulsing connection lines
═══════════════════════════════════════════ */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

let W, H;
const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
resize();
window.addEventListener('resize', resize);

// --- Grid ---
const CELL = 54;

// --- Particles ---
const PARTICLE_COUNT = 60;
const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
  x: Math.random() * 2000,
  y: Math.random() * 1200,
  vx: (Math.random() - 0.5) * 0.35,
  vy: (Math.random() - 0.5) * 0.35,
  r: Math.random() * 2 + 1,
  alpha: Math.random() * 0.6 + 0.2,
  pulse: Math.random() * Math.PI * 2,
}));

// --- Data nodes (larger glowing dots on grid intersections) ---
const nodes = [];
const makeNodes = () => {
  nodes.length = 0;
  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      if (Math.random() < 0.06) {
        nodes.push({ x: c * CELL, y: r * CELL, phase: Math.random() * Math.PI * 2, size: Math.random() * 3 + 2 });
      }
    }
  }
};
makeNodes();
window.addEventListener('resize', makeNodes);

// --- Moving scanline ---
let scanY = 0;

// --- Binary rain chars ---
const BINARY = '01';
const drops = Array.from({ length: Math.ceil(2000 / 28) }, () => ({
  x: 0, y: Math.random() * -1200, speed: Math.random() * 0.6 + 0.2, alpha: Math.random() * 0.08 + 0.02,
}));

let t = 0;
function draw() {
  t += 0.012;
  ctx.clearRect(0, 0, W, H);

  // Deep space gradient
  const bg = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, Math.max(W, H) * 0.75);
  bg.addColorStop(0, '#040d2a');
  bg.addColorStop(1, '#020818');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Grid ──
  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;
  ctx.strokeStyle = 'rgba(10,132,255,0.06)';
  ctx.lineWidth = 0.7;
  for (let c = 0; c < cols; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
  }
  for (let r = 0; r < rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
  }

  // ── Glowing grid nodes ──
  nodes.forEach(n => {
    const pulse = (Math.sin(t * 1.5 + n.phase) + 1) / 2;
    const a = 0.15 + pulse * 0.5;
    const s = n.size + pulse * 2;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, s * 3);
    g.addColorStop(0, `rgba(10,200,255,${a})`);
    g.addColorStop(1, 'rgba(10,132,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(n.x, n.y, s * 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = `rgba(200,240,255,${a * 0.9})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2); ctx.fill();
  });

  // ── Binary rain ──
  ctx.font = '11px monospace';
  drops.forEach((d, i) => {
    d.x = (i * 28) % W;
    d.y += d.speed;
    if (d.y > H + 20) d.y = Math.random() * -200;
    const char = BINARY[Math.floor(Math.random() * BINARY.length)];
    ctx.fillStyle = `rgba(0,180,255,${d.alpha})`;
    ctx.fillText(char, d.x, d.y);
  });

  // ── Floating particles ──
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.pulse += 0.025;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
    const gp = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    gp.addColorStop(0, `rgba(10,160,255,${a})`);
    gp.addColorStop(1, 'rgba(10,132,255,0)');
    ctx.fillStyle = gp;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(180,230,255,${a})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.8, 0, Math.PI * 2); ctx.fill();
  });

  // ── Connection lines between nearby particles ──
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const a = (1 - dist / 140) * 0.18;
        ctx.strokeStyle = `rgba(10,160,255,${a})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // ── Scanline sweep ──
  scanY = (scanY + 0.8) % H;
  const scan = ctx.createLinearGradient(0, scanY - 80, 0, scanY + 80);
  scan.addColorStop(0, 'rgba(10,132,255,0)');
  scan.addColorStop(0.5, 'rgba(10,132,255,0.04)');
  scan.addColorStop(1, 'rgba(10,132,255,0)');
  ctx.fillStyle = scan;
  ctx.fillRect(0, scanY - 80, W, 160);

  // thin bright line
  ctx.strokeStyle = 'rgba(0,200,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, scanY); ctx.lineTo(W, scanY); ctx.stroke();

  // ── Center glow behind cards ──
  const cg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.45);
  cg.addColorStop(0, 'rgba(10,60,160,0.18)');
  cg.addColorStop(1, 'rgba(10,60,160,0)');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
