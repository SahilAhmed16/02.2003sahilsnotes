
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Architecture — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 40%, #1e3a8a 70%, #0c4a6e 100%);
            min-height: 100vh;
            color: #e0f2fe;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.3), transparent 70%);
            top: -10%;
            left: -10%;
            animation: orbFloat1 25s infinite ease-in-out;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.25), transparent 70%);
            bottom: -15%;
            right: -10%;
            animation: orbFloat2 30s infinite ease-in-out;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2), transparent 70%);
            top: 40%;
            left: 50%;
            animation: orbFloat3 20s infinite ease-in-out;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.1); }
            66% { transform: translate(-40px, -30px) scale(0.9); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, -80px) scale(1.15); }
            66% { transform: translate(50px, 40px) scale(0.85); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2) translate(30px, -20px); }
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(147, 197, 253, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(147, 197, 253, 0.8);
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== MAIN CARD ===== */
        .coming-soon-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 32px;
            padding: 60px 50px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 
                0 30px 80px rgba(37, 99, 235, 0.2),
                0 0 60px rgba(56, 189, 248, 0.1);
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            overflow: hidden;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .coming-soon-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #0ea5e9, #38bdf8, #2563eb);
            background-size: 300% 100%;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* ===== ICON ===== */
        .icon-wrap {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.3), rgba(14, 165, 233, 0.3));
            border: 2px solid rgba(96, 165, 250, 0.3);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            position: relative;
            animation: iconPulse 3s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
        }

        @keyframes iconPulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
            }
            50% { 
                transform: scale(1.08); 
                box-shadow: 0 15px 50px rgba(37, 99, 235, 0.5), 0 0 30px rgba(56, 189, 248, 0.3);
            }
        }

        /* ===== BADGE ===== */
        .badge {
            display: inline-block;
            padding: 8px 24px;
            background: rgba(37, 99, 235, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.4);
            border-radius: 50px;
            font-size: 0.8rem;
            color: #93c5fd;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            animation: badgeGlow 3s ease-in-out infinite;
            backdrop-filter: blur(10px);
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(37, 99, 235, 0.2); }
            50% { box-shadow: 0 0 25px rgba(37, 99, 235, 0.5); }
        }

        /* ===== TITLE ===== */
        .title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e0f2fe, #7dd3fc, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 3s linear infinite;
            background-size: 300% 100%;
        }

        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* ===== MESSAGE ===== */
        .message {
            font-size: 1.1rem;
            color: #93c5fd;
            line-height: 1.8;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .highlight {
            color: #38bdf8;
            font-weight: 600;
        }

        /* ===== WORKING ANIMATION ===== */
        .working-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-15px) scale(1.2); }
        }

        .working-text {
            font-size: 0.95rem;
            color: #60a5fa;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: transparent;
            border: 2px solid rgba(96, 165, 250, 0.4);
            border-radius: 50px;
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 1s both;
        }

        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .back-btn:hover::before {
            left: 100%;
        }

        .back-btn:hover {
            border-color: rgba(147, 197, 253, 0.8);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }

        .back-arrow {
            transition: transform 0.3s ease;
        }

        .back-btn:hover .back-arrow {
            transform: translateX(-5px);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #2563eb, #0ea5e9);
            border-radius: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .coming-soon-card {
                padding: 40px 30px;
            }
            .icon-wrap {
                width: 80px;
                height: 80px;
                font-size: 2.8rem;
            }
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles-container" id="particles"></div>

    <!-- Main Card -->
    <div class="coming-soon-card">
        <div class="icon-wrap">🖥️</div>
        <div class="badge">Coming Soon</div>
        <h1 class="title">Computer Architecture</h1>
        <p class="message">
            <span class="highlight">Sahil</span> is currently working on the Computer Architecture notes. 
            The notes will be released soon. Stay tuned for comprehensive MCA Semester 1 study material!
        </p>
        <div class="working-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span class="working-text">Working on it...</span>
        </div>
        <a href="../index.html" class="back-btn">
            <span class="back-arrow">←</span>
            <span>Back to Home</span>
        </a>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 50;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = Math.random() * 20 + 's';
                const size = Math.random() * 3 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.opacity = Math.random() * 0.5 + 0.3;
                container.appendChild(p);
            }
        }

        // Parallax effect
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            orbs.forEach((orb, i) => {
                const speed = (i + 1) * 15;
                orb.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        document.addEventListener('DOMContentLoaded', createParticles);
    </script>
</body>
</html>
